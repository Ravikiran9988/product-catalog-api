services:
  db:
    image: postgres:16-alpine
    container_name: product_catalog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: product_catalog_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/product_catalog
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: .
    container_name: product_catalog_seed
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/product_catalog
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed --count 200000 --batch-size 5000"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  postgres_data:
